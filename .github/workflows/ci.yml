name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirement.txt ]; then pip install -r requirement.txt; fi
        SKJ_PATH=$(pip show sklearn-json | grep Location | awk '{print $2}')/sklearn_json
        find $SKJ_PATH -name "*.py" -exec sed -i 's/, _gb_losses//g' {} +
    - name: Run tests
      run: |
        python -m pytest test_main.py
