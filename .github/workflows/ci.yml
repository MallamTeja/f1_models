name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirement.txt ]; then pip install -r requirement.txt; fi
        python -c "import os, sklearn_json; p = os.path.dirname(sklearn_json.__file__); [open(f, 'w').write(open(f).read().replace(', _gb_losses', '')) for f in [os.path.join(p, n) for n in ['classification.py', 'regression.py']] if os.path.exists(f)]"
    - name: Run tests
      run: |
        python -m pytest test_main.py
