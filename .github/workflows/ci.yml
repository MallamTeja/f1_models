name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirement.txt ]; then pip install -r requirement.txt; fi
        # Definitive non-import patch for sklearn-json
        python -c "import os, sys; from glob import glob; import site; skj_paths = [os.path.join(p, 'sklearn_json') for p in site.getsitepackages() + [site.getusersitepackages()] if os.path.isdir(os.path.join(p, 'sklearn_json'))]; [ [open(py, 'w').write(open(py).read().replace(', _gb_losses', '')) for py in glob(os.path.join(p, '**', '*.py'), recursive=True)] for p in skj_paths]"
    - name: Run tests
      run: |
        python -m pytest test_main.py
