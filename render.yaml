services:
  - type: web
    name: f1-predictor
    env: python
    plan: free
    buildCommand: "pip install -r requirement.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
